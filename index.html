<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAZONA FABULOSA · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ... (Se mantiene todo tu CSS original igual) ... */
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-pale: #F5E6C0; --black: #0D0D0D; --dark: #1A1410;
  --dark2: #241E18; --dark3: #2E2720; --mid: #4A3F35; --text: #F0E8D8; --text-soft: #B8A898;
  --rose: #C97B7B; --green: #6BAA8A; --blue: #7B9EC9; --red: #C96B6B; --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07); --border: rgba(201,168,76,0.2); --border2: rgba(201,168,76,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--black);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(201,168,76,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
#loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--black)}
.login-box{position:relative;background:var(--dark);border:1px solid var(--border2);padding:60px 50px;width:440px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;letter-spacing:0.15em;color:var(--gold);margin-bottom:4px}
.login-logo span{color:var(--text);font-style:italic}
.login-sub{font-size:0.7rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--text-soft);margin-bottom:40px}
.login-form input{width:100%;background:var(--dark2);border:1px solid var(--border);padding:14px 18px;color:var(--text);font-family:'Jost',sans-serif;font-size:0.9rem;margin-bottom:14px;outline:none}
.login-form button{width:100%;background:var(--gold);color:var(--black);border:none;padding:15px;font-size:0.85rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer}
.login-error{color:var(--rose);font-size:0.8rem;margin-top:10px;min-height:20px}
#app{display:none;min-height:100vh}
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 30px;height:64px;display:flex;align-items:center;justify-content:space-between}
.header-brand{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.15em;color:var(--gold)}
.header-brand span{color:var(--text);font-style:italic}
#sidebar{position:fixed;top:64px;left:0;bottom:0;width:240px;background:var(--dark);border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding:20px 0}
#main{margin-left:240px;margin-top:64px;padding:30px;min-height:calc(100vh - 64px);position:relative;z-index:1}
.page{display:none} .page.active{display:block}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 22px;cursor:pointer;font-size:0.85rem;color:var(--text-soft)}
.nav-item.active{color:var(--gold);background:var(--surface2)}
.card{background:var(--dark);border:1px solid var(--border);padding:24px;margin-bottom:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.form-grid{display:grid;gap:16px} .cols-4{grid-template-columns:repeat(4,1fr)}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.btn{border:none;padding:12px 24px;cursor:pointer;text-transform:uppercase;font-size:0.8rem}
.btn-gold{background:var(--gold);color:var(--black)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--dark);border:1px solid var(--border2);padding:34px;width:520px}
@media(max-width:768px){ #sidebar{width:100%;top:auto;bottom:0;flex-direction:row} #main{margin-left:0;margin-bottom:60px} }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:20px">💎</div>
    <div class="login-logo">AMAZONA <span>Fabulosa</span></div>
    <div class="login-sub">Sistema de Gestión Comercial</div>
    <div class="login-form">
      <input type="email" id="loginEmail" placeholder="correo@amazona.cl" autocomplete="off">
      <input type="password" id="loginPass" placeholder="Contraseña">
      <button id="btnIngresar">Ingresar</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-brand">AMAZONA <span>Fabulosa</span></div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="userAvatar" style="width:34px;height:34px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--black);font-weight:600">JU</div>
      <div>
        <div id="userNameDisplay" style="font-weight:500;color:var(--text);font-size:0.8rem">Juan</div>
        <div id="userRoleDisplay" style="font-size:0.7rem;color:var(--text-soft)">Administrador</div>
      </div>
      <button class="btn btn-sm btn-outline" style="background:none;border:1px solid var(--border);color:var(--text-soft);padding:6px 12px" id="btnLogout"><i class="fa fa-sign-out-alt"></i> Salir</button>
    </div>
  </header>

  <div id="sidebar">
    <div class="nav-item active" onclick="navTo('dashboard')"><i class="fa fa-chart-pie"></i> Dashboard</div>
    <div class="nav-item" onclick="navTo('ventas')"><i class="fa fa-shopping-bag"></i> Ventas</div>
    <div class="nav-item" onclick="navTo('cxc')"><i class="fa fa-file-invoice-dollar"></i> Cuentas x Cobrar</div>
    <div class="nav-item" onclick="navTo('productos')"><i class="fa fa-gem"></i> Productos</div>
    <div class="nav-item" id="adminNav" onclick="navTo('admin')"><i class="fa fa-users-cog"></i> Admin</div>
  </div>

  <div id="main">
    <div id="page-dashboard" class="page active">
      <h1 style="color:var(--gold);font-family:'Cormorant Garamond';margin-bottom:20px">Dashboard</h1>
      <div class="kpi-grid" id="kpiGrid"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div class="card"><canvas id="chartVCG" height="250"></canvas></div>
        <div class="card"><canvas id="chartProductos" height="250"></canvas></div>
      </div>
    </div>
    
    <div id="page-ventas" class="page">... (Contenido de ventas) ...</div>
    <div id="page-productos" class="page">... (Contenido de productos) ...</div>
    <div id="page-cxc" class="page">... (Contenido de CXC) ...</div>
    <div id="page-admin" class="page">... (Contenido de Admin) ...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAc_IsWnhUUeaXusSp8Ul87IgKxJiJAsaE",
  authDomain: "a-crm-83169.firebaseapp.com",
  projectId: "a-crm-83169",
  storageBucket: "a-crm-83169.firebasestorage.app",
  messagingSenderId: "66263142727",
  appId: "1:66263142727:web:7b56763c01953ff2a23c62"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Datos y Estado
let DB = { users: [], ventas: [], productos: [], gastos: [] };
let currentUser = null;

// FUNCIONES GLOBALES (Expuestas a window para que los onclick funcionen)
window.navTo = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const targetPage = document.getElementById('page-' + page);
  if(targetPage) targetPage.classList.add('active');
  if(page === 'dashboard') renderDashboard();
};

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');

  if(!email || !pass) {
    errorEl.textContent = "Ingresa tus credenciales.";
    return;
  }

  // Simulación de validación (Cargar desde Firebase en producción real)
  if(email === "juan@amazona.cl" && pass === "12345") {
    currentUser = { name: "Juan", role: "admin" };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderDashboard();
  } else {
    errorEl.textContent = "Correo o clave incorrectos.";
  }
}

function renderDashboard() {
  // Lógica de gráficos (simplificada para el ejemplo)
  const ctx = document.getElementById('chartVCG').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: { labels: ['Ventas', 'Costos'], datasets: [{ data: [12000, 7000], backgroundColor: ['#C9A84C', '#C96B6B'] }] }
  });
}

// ASIGNACIÓN DE EVENTOS AL CARGAR EL DOM
document.addEventListener('DOMContentLoaded', () => {
  const btnIngresar = document.getElementById('btnIngresar');
  if(btnIngresar) btnIngresar.addEventListener('click', doLogin);

  const btnLogout = document.getElementById('btnLogout');
  if(btnLogout) btnLogout.addEventListener('click', () => location.reload());
});

// Exponer funciones adicionales que uses en onclick
window.doLogin = doLogin;
</script>
</body>
</html>
