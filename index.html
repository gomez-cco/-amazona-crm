<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAZONA FABULOSA · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* --- TUS ESTILOS ORIGINALES COMPLETOS --- */
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-pale: #F5E6C0; --black: #0D0D0D; --dark: #1A1410;
  --dark2: #241E18; --dark3: #2E2720; --mid: #4A3F35; --text: #F0E8D8; --text-soft: #B8A898;
  --rose: #C97B7B; --green: #6BAA8A; --blue: #7B9EC9; --red: #C96B6B; --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07); --border: rgba(201,168,76,0.2); --border2: rgba(201,168,76,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--black);color:var(--text);min-height:100vh;overflow-x:hidden}
#loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--black)}
.login-box{position:relative;background:var(--dark);border:1px solid var(--border2);padding:60px 50px;width:440px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;letter-spacing:0.15em;color:var(--gold);margin-bottom:4px}
.login-sub{font-size:0.7rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--text-soft);margin-bottom:40px}
.login-form input{width:100%;background:var(--dark2);border:1px solid var(--border);padding:14px 18px;color:var(--text);font-family:'Jost',sans-serif;font-size:0.9rem;margin-bottom:14px;outline:none}
#app{display:none;min-height:100vh}
header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 30px;height:64px;display:flex;align-items:center;justify-content:space-between}
#sidebar{position:fixed;top:64px;left:0;bottom:0;width:240px;background:var(--dark);border-right:1px solid var(--border);overflow-y:auto;z-index:90;padding:20px 0}
#main{margin-left:240px;margin-top:64px;padding:30px;min-height:calc(100vh - 64px)}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 22px;cursor:pointer;font-size:0.85rem;color:var(--text-soft)}
.nav-item.active{color:var(--gold);background:var(--surface2)}
.page{display:none} .page.active{display:block}
.card{background:var(--dark);border:1px solid var(--border);padding:24px;margin-bottom:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);color:var(--gold)}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.btn-gold{background:var(--gold);color:var(--black);border:none;padding:15px;font-size:0.85rem;font-weight:600;text-transform:uppercase;cursor:pointer}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">AMAZONA <span>Fabulosa</span></div>
    <div class="login-sub">Gestión Comercial</div>
    <div class="login-form">
      <input type="email" id="loginEmail" placeholder="juan@amazona.cl">
      <input type="password" id="loginPass" placeholder="Contraseña">
      <button onclick="doLogin()" class="btn-gold" style="width:100%">Ingresar</button>
      <div id="loginError" style="color:var(--rose);margin-top:10px;font-size:0.8rem"></div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-brand" style="font-family:'Cormorant Garamond';color:var(--gold);font-size:1.5rem">AMAZONA <span>Fabulosa</span></div>
    <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--text-soft);padding:6px 12px;cursor:pointer">Salir</button>
  </header>

  <div id="sidebar">
    <div class="nav-item active" onclick="navTo('dashboard')"><i class="fa fa-chart-pie"></i> Dashboard</div>
    <div class="nav-item" onclick="navTo('ventas')"><i class="fa fa-shopping-bag"></i> Ventas</div>
    <div class="nav-item" onclick="navTo('cxc')"><i class="fa fa-file-invoice-dollar"></i> Cuentas x Cobrar</div>
    <div class="nav-item" onclick="navTo('productos')"><i class="fa fa-gem"></i> Inventario</div>
    <div class="nav-item" onclick="navTo('gastos')"><i class="fa fa-receipt"></i> Gastos</div>
  </div>

  <div id="main">
    <div id="page-dashboard" class="page active">
      <h1 style="color:var(--gold);margin-bottom:20px">Dashboard</h1>
      <div class="kpi-grid" id="kpiGrid"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div class="card"><canvas id="chartVCG"></canvas></div>
        <div class="card"><canvas id="chartProd"></canvas></div>
      </div>
    </div>
    
    <div id="page-ventas" class="page"><div class="card"><h2>Panel de Ventas</h2><div id="ventasContent"></div></div></div>
    <div id="page-cxc" class="page"><div class="card"><h2>Cuentas por Cobrar</h2><div id="cxcContent"></div></div></div>
    <div id="page-productos" class="page"><div class="card"><h2>Inventario</h2><table><thead><tr><th>Producto</th><th>Stock</th><th>Venta</th></tr></thead><tbody id="prodTbody"></tbody></table></div></div>
    <div id="page-gastos" class="page"><div class="card"><h2>Gastos</h2><div id="gastosContent"></div></div></div>
  </div>
</div>

<script type="module">

  ],

};

// --- LA LLAVE MAESTRA (Exponiendo funciones al mundo global) ---
window.doLogin = () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const user = DB.users.find(u => u.email === email && u.pass === pass);
  if(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderDashboard();
  } else {
    document.getElementById('loginError').innerText = "Credenciales inválidas.";
  }
};

window.navTo = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if(page === 'productos') renderProductos();
};

window.doLogout = () => location.reload();

// --- LÓGICA DE RENDERIZADO ---
function renderProductos() {
  const tbody = document.getElementById('prodTbody');
  tbody.innerHTML = DB.productos.map(p => `<tr><td>${p.nombre}</td><td>${p.cantidad}</td><td>$${p.precioVenta.toLocaleString()}</td></tr>`).join('');
}

function renderDashboard() {
  const stockVenta = DB.productos.reduce((s,p) => s + (p.precioVenta * p.cantidad), 0);
  const inversion = DB.productos.reduce((s,p) => s + (p.costo * p.cantidad), 0);
  
  document.getElementById('kpiGrid').innerHTML = `
    <div class="card"><p style="font-size:0.7rem;color:var(--text-soft)">VALOR VITRINA</p><h2>$${stockVenta.toLocaleString()}</h2></div>
    <div class="card"><p style="font-size:0.7rem;color:var(--text-soft)">INVERSIÓN REAL</p><h2>$${inversion.toLocaleString()}</h2></div>
  `;

  new Chart(document.getElementById('chartVCG'), {
    type: 'bar',
    data: { labels: ['Venta', 'Costo'], datasets: [{ data: [stockVenta, inversion], backgroundColor: ['#C9A84C', '#7B9EC9'] }] }
  });
}
</script>
</body>
</html>
