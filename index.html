<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAZONA FABULOSA · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* RE-INSTALACIÓN DE TUS ESTILOS ORIGINALES */
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-pale: #F5E6C0; --black: #0D0D0D; --dark: #1A1410;
  --dark2: #241E18; --dark3: #2E2720; --mid: #4A3F35; --text: #F0E8D8; --text-soft: #B8A898;
  --rose: #C97B7B; --green: #6BAA8A; --blue: #7B9EC9; --red: #C96B6B; --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07); --border: rgba(201,168,76,0.2); --border2: rgba(201,168,76,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Jost',sans-serif; background:var(--black); color:var(--text); min-height:100vh; overflow-x:hidden; }
#loginScreen { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:var(--black); }
.login-box { background:var(--dark); border:1px solid var(--border2); padding:60px 50px; width:440px; text-align:center; }
.login-logo { font-family:'Cormorant Garamond',serif; font-size:2.4rem; color:var(--gold); }
#app { display:none; }
header { position:fixed; top:0; left:0; right:0; height:64px; background:rgba(13,13,13,0.95); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 30px; z-index:100; }
#sidebar { position:fixed; top:64px; left:0; bottom:0; width:240px; background:var(--dark); border-right:1px solid var(--border); padding-top:20px; z-index:90; }
#main { margin-left:240px; margin-top:64px; padding:30px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:12px 24px; cursor:pointer; color:var(--text-soft); font-size:0.9rem; }
.nav-item.active { color:var(--gold); background:var(--surface2); }
.page { display:none; } .page.active { display:block; }
.card { background:var(--dark); border:1px solid var(--border); padding:24px; margin-bottom:20px; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; }
table { width:100%; border-collapse:collapse; font-size:0.85rem; }
th { text-align:left; padding:12px; border-bottom:1px solid var(--border); color:var(--gold); }
td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.04); }
.btn-gold { background:var(--gold); color:var(--black); padding:12px 24px; border:none; cursor:pointer; font-weight:600; text-transform:uppercase; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">AMAZONA <span>Fabulosa</span></div>
    <div style="margin-top:30px">
      <input type="email" id="loginEmail" placeholder="juan@amazona.cl" style="width:100%; padding:12px; margin-bottom:10px; background:#222; border:1px solid #444; color:white;">
      <input type="password" id="loginPass" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:20px; background:#222; border:1px solid #444; color:white;">
      <button id="btnLogin" class="btn-gold" style="width:100%;">Ingresar</button>
      <p id="loginError" style="color:var(--rose); margin-top:15px; font-size:0.8rem;"></p>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div style="font-family:'Cormorant Garamond'; color:var(--gold); font-size:1.5rem;">AMAZONA FABULOSA</div>
    <button id="btnLogout" style="background:none; border:1px solid var(--border); color:var(--text-soft); padding:6px 15px; cursor:pointer;">Cerrar Sesión</button>
  </header>

  <div id="sidebar">
    <div class="nav-item active" id="navDash"><i class="fa fa-chart-pie"></i> Dashboard</div>
    <div class="nav-item" id="navVentas"><i class="fa fa-shopping-bag"></i> Ventas</div>
    <div class="nav-item" id="navCxC"><i class="fa fa-file-invoice-dollar"></i> Cuentas x Cobrar</div>
    <div class="nav-item" id="navProd"><i class="fa fa-gem"></i> Inventario</div>
    <div class="nav-item" id="navGastos"><i class="fa fa-receipt"></i> Gastos</div>
  </div>

  <div id="main">
    <div id="page-dashboard" class="page active">
      <h1 style="color:var(--gold); margin-bottom:20px;">Resumen de Negocio</h1>
      <div class="kpi-grid" id="kpiGrid"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
        <div class="card"><canvas id="chartMain" height="250"></canvas></div>
        <div class="card"><canvas id="chartStock" height="250"></canvas></div>
      </div>
    </div>

    <div id="page-ventas" class="page">
      <h1 style="color:var(--gold); margin-bottom:20px;">Registro de Ventas</h1>
      <div class="card">
        <button id="btnExcel" class="btn-gold">Descargar Reporte Completo (Excel)</button>
        <table style="margin-top:20px;">
          <thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead>
          <tbody id="ventasTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="page-productos" class="page">
      <h1 style="color:var(--gold); margin-bottom:20px;">Inventario Detallado</h1>
      <div class="card" style="overflow-x:auto;">
        <table>
          <thead><tr><th>Producto</th><th>Stock</th><th>Costo</th><th>Venta</th><th>Proveedor</th></tr></thead>
          <tbody id="productosTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="page-cxc" class="page"><h1 style="color:var(--gold)">Cuentas por Cobrar</h1><div class="card" id="cxcTbody"></div></div>
    <div id="page-gastos" class="page"><h1 style="color:var(--gold)">Gastos</h1><div class="card" id="gastosTbody"></div></div>
  </div>
</div>

<script type="module">

    {id:33,nombre:'Cadena Trébol',cantidad:1,costo:13990,precioVenta:19990,proveedor:'MISJOYAS'}
  ],
  gastos: [{detalle:'Combustible', monto:40000}, {detalle:'Almuerzo', monto:30000}]
};

// --- NAVEGACIÓN Y RENDER ---
function navTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if(page === 'dashboard') renderDashboard();
  if(page === 'productos') renderProductos();
}

function renderProductos() {
  const tbody = document.getElementById('productosTbody');
  tbody.innerHTML = DB.productos.map(p => `<tr><td>${p.nombre}</td><td>${p.cantidad}</td><td>$${p.costo.toLocaleString()}</td><td>$${p.precioVenta.toLocaleString()}</td><td>${p.proveedor}</td></tr>`).join('');
}

function renderDashboard() {
  const stockVenta = DB.productos.reduce((s,p) => s + (p.precioVenta * p.cantidad), 0);
  const inversion = DB.productos.reduce((s,p) => s + (p.costo * p.cantidad), 0);
  document.getElementById('kpiGrid').innerHTML = `<div class="card"><h3>Valor Vitrina</h3><h2>$${stockVenta.toLocaleString()}</h2></div><div class="card"><h3>Inversión</h3><h2>$${inversion.toLocaleString()}</h2></div>`;
  
  new Chart(document.getElementById('chartMain'), { type: 'bar', data: { labels: ['Venta', 'Costo'], datasets: [{ data: [stockVenta, inversion], backgroundColor: ['#C9A84C', '#7B9EC9'] }] } });
}

// --- CONTROL DE EVENTOS (LA SOLUCIÓN DEFINITIVA) ---
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnLogin').onclick = () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    const user = DB.users.find(u => u.email === email && u.pass === pass);
    if(user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderDashboard();
    } else {
      document.getElementById('loginError').innerText = "Acceso denegado.";
    }
  };

  document.getElementById('btnLogout').onclick = () => location.reload();
  document.getElementById('navDash').onclick = () => navTo('dashboard');
  document.getElementById('navVentas').onclick = () => navTo('ventas');
  document.getElementById('navCxC').onclick = () => navTo('cxc');
  document.getElementById('navProd').onclick = () => navTo('productos');
  document.getElementById('navGastos').onclick = () => navTo('gastos');
  document.getElementById('btnExcel').onclick = () => alert("Descargando reporte...");
});
</script>
</body>
</html>
