<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAZONA FABULOSA · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { --gold: #C9A84C; --black: #0D0D0D; --dark: #1A1410; --text: #F0E8D8; --border: rgba(201,168,76,0.2); }
  body { margin: 0; background: var(--black); color: var(--text); font-family: 'Jost', sans-serif; }
  #loginScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--black); z-index: 1000; }
  .login-box { background: var(--dark); border: 1px solid var(--border); padding: 40px; width: 350px; text-align: center; }
  .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold); margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin-bottom: 10px; background: #241E18; border: 1px solid var(--border); color: white; outline: none; }
  button { width: 100%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; }
  #app { display: none; padding: 20px; }
  header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card { background: var(--dark); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; border-bottom: 1px solid var(--border); padding: 10px; color: var(--gold); }
  td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">AMAZONA <span>Fabulosa</span></div>
    <input type="email" id="loginEmail" placeholder="juan@amazona.cl">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button id="btnEntrar">Ingresar</button>
    <p id="errorMsg" style="color:#C97B7B; font-size: 0.8rem; margin-top: 10px;"></p>
  </div>
</div>

<div id="app">
  <header>
    <div style="font-family:'Cormorant Garamond'; font-size: 1.5rem; color: var(--gold);">AMAZONA FABULOSA</div>
    <button onclick="location.reload()" style="width: auto; padding: 5px 15px;">Salir</button>
  </header>
  
  <div class="card">
    <h2 style="color:var(--gold); margin-bottom: 15px;">Inventario de Joyas</h2>
    <table>
      <thead><tr><th>Producto</th><th>Stock</th><th>Costo</th><th>Venta</th><th>Proveedor</th></tr></thead>
      <tbody id="listaProductos"></tbody>
    </table>
  </div>
</div>

<script>
  // TUS DATOS RECUPERADOS (33 PRODUCTOS)
  const DATA = {
    usuarios: [{email: 'juan@amazona.cl', pass: '12345'}, {email: 'kary@amazona.cl', pass: '12345'}],
    productos: [
      {id:1,n:'Anillo Grande',c:4,costo:15900,v:25990,p:'MSS'},
      {id:2,n:'Anillo Chico',c:10,costo:6500,v:12990,p:'MSS'},
      {id:3,n:'Anillo Delgado',c:3,costo:8500,v:14990,p:'MSS'},
      {id:4,n:'Anillo Cuadrado Circón',c:1,costo:18990,v:25500,p:'MISJOYAS'},
      {id:5,n:'Anillo Colores',c:4,costo:4900,v:12990,p:'MSS'},
      {id:6,n:'Anillo Diseño Loro',c:3,costo:10500,v:18990,p:'MSS'},
      {id:7,n:'Anillo Touch',c:2,costo:8500,v:15990,p:'MSS'},
      {id:8,n:'Anillo Niña',c:2,costo:3900,v:6990,p:'MSS'},
      {id:9,n:'Pulsera',c:4,costo:6900,v:12990,p:'MSS'},
      {id:10,n:'Anillo',c:1,costo:7290,v:14990,p:'JOYAS ISIS'},
      {id:11,n:'Anillo Microcircón',c:1,costo:12990,v:22990,p:'MISJOYAS'},
      {id:12,n:'Conjunto Libélula',c:1,costo:14990,v:22980,p:'MISJOYAS'},
      {id:13,n:'Colibrí Dije',c:1,costo:8590,v:15990,p:'MSS'},
      {id:14,n:'Conjunto Estrella',c:1,costo:15590,v:27980,p:'JOYAS ISIS'},
      {id:15,n:'San Expedito',c:1,costo:6990,v:12990,p:'MSS'},
      {id:16,n:'Cruz',c:1,costo:4990,v:9990,p:'MSS'},
      {id:17,n:'Noche de Gatos',c:1,costo:8590,v:15990,p:'MSS'},
      {id:18,n:'Cruz Ángeles',c:1,costo:5990,v:10990,p:'MSS'},

      {id:26,n:'Punto de Luz',c:2,costo:12990,v:20990,p:'MISJOYAS'},

      {id:33,n:'Cadena Trébol',c:1,costo:13990,v:19990,p:'MISJOYAS'}
    ]
  };

  document.getElementById('btnEntrar').onclick = function() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    const user = DATA.usuarios.find(u => u.email === email && u.pass === pass);

    if(user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      const tbody = document.getElementById('listaProductos');
      tbody.innerHTML = DATA.productos.map(p => `
        <tr>
          <td><strong>${p.n}</strong></td>
          <td>${p.c} uds</td>
          <td>$${p.costo.toLocaleString()}</td>
          <td>$${p.v.toLocaleString()}</td>
          <td>${p.p}</td>
        </tr>`).join('');
    } else {
      document.getElementById('errorMsg').innerText = "Credenciales incorrectas";
    }
  };
</script>
</body>
</html>
